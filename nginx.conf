server {
    listen 80;
    server_name www.noudesign.vn;
    return 301 https://noudesign.vn$request_uri;
}

server {
    listen 80;
    server_name noudesign.vn 103.82.26.60;
    return 301 https://noudesign.vn$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name www.noudesign.vn;

    ssl_certificate /etc/letsencrypt/live/noudesign.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/noudesign.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://noudesign.vn$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name noudesign.vn 103.82.26.60;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/letsencrypt/live/noudesign.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/noudesign.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
