name: Deploy Next.js to Server via PM2

on:
  push:
    branches:
      - develop # Kích hoạt khi có code push lên nhánh develop
      - main    # Kích hoạt khi có code push lên nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute deployment script on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Thay đổi đường dẫn dưới đây thành đường dẫn thực tế đến thư mục dự án trên VPS của bạn
            cd /path/to/your/project/webnhadat
            
            # Cấp quyền thực thi cho script (phòng trường hợp chưa có)
            chmod +x deploy.sh
            
            # Chạy script deploy
            ./deploy.sh
